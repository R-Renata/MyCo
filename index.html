<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyCo</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    background: #000;
}

.container {
    position: relative;
    width: 100%;
    max-width: 430px;
    margin: 0 auto;
}

.container img {
    width: 100%;
    display: block;
}

/* Play Store */

.playstore {
    position: absolute;
    left: 6%;
    top: 62%;
    width: 42%;
    height: 6%;
    z-index: 10;
}

/* App Store */

.appstore {
    position: absolute;
    left: 52%;
    top: 62%;
    width: 42%;
    height: 6%;
    z-index: 10;
}
</style>
</head>

<body>

<div class="container">

    <img src="landing-download-app.jpg" alt="MyCo">

    <a class="playstore"
       href="https://play.google.com/"
       target="_blank"
       aria-label="Play Store">
    </a>

    <a class="appstore"
       href="https://apps.apple.com/"
       target="_blank"
       aria-label="App Store">
    </a>

</div>

</body>
</html>
