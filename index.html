<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyCo</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    background: #000;
    overflow: hidden;
}

.container {
    position: relative;
    width: 100vw;
    max-width: 430px;
    margin: auto;
}

.container img {
    width: 100%;
    display: block;
}

/* PLAY STORE */

.playstore {
    position: absolute;
    left: 6%;
    top: 63%;
    width: 42%;
    height: 6%;
}

/* APP STORE */

.appstore {
    position: absolute;
    left: 52%;
    top: 63%;
    width: 42%;
    height: 6%;
}
</style>
</head>

<body>

<div class="container">

<img src="landing.jpg" alt="MyCo">

<a class="playstore"
   href="https://play.google.com/"
   target="_blank">
</a>

<a class="appstore"
   href="https://apps.apple.com/"
   target="_blank">
</a>

</div>

</body>
</html>
